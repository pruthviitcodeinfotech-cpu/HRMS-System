name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

# The frozen environment: one interpreter, one lockfile. These must match
# backend/.python-version and backend/Dockerfile.
env:
  PYTHON_VERSION: "3.12.13"
  UV_VERSION: "0.11.21"

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Lint & test (Python 3.12.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      # Fails if uv.lock or requirements*.txt drifted from pyproject.toml. Catches the
      # "I edited pyproject and forgot to relock" class of non-reproducible build.
      - name: Verify lockfile is in sync
        run: make lock-check

      - name: Install frozen dependencies
        run: make install

      - name: Confirm the interpreter is the frozen one
        run: |
          .venv/bin/python -c "import sys; v=sys.version_info; assert (v.major, v.minor) == (3, 12), sys.version; print(sys.version)"

      # Reported, not enforced. The codebase carries pre-existing debt that predates the
      # environment freeze: ~537 ruff findings (mostly E501/F401), 79 files unformatted,
      # 219 mypy errors. Gating on these today would mean a permanently red pipeline or a
      # sweeping reformat of business-logic files. Flip `continue-on-error` to false, one
      # tool at a time, as each is driven to zero.
      - name: Lint (ruff) — reported, not gating
        continue-on-error: true
        run: .venv/bin/python -m ruff check app tests

      - name: Format check (black) — reported, not gating
        continue-on-error: true
        run: .venv/bin/python -m black --check app tests

      - name: Type check (mypy) — reported, not gating
        continue-on-error: true
        run: .venv/bin/python -m mypy app

      # Gating. The suite must be green on the frozen environment.
      - name: Test
        run: make test

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: runtime
          push: false
          load: true
          tags: hrms-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Proves the image starts, serves /health, and generates the OpenAPI schema —
      # the same checks Phase 1 ran locally, now against the built artifact.
      - name: Smoke test the image
        run: |
          docker run -d --name hrms -p 8000:8000 hrms-backend:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then break; fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health
          curl -fsS -o /dev/null http://127.0.0.1:8000/docs
          curl -fsS http://127.0.0.1:8000/api/v1/openapi.json | python3 -c "import sys,json; print('openapi paths:', len(json.load(sys.stdin)['paths']))"
          docker rm -f hrms

      - name: Verify the image runs the frozen interpreter
        run: |
          docker run --rm hrms-backend:ci python -c "import sys; v=sys.version_info; assert (v.major, v.minor, v.micro) == (3, 12, 13), sys.version; print(sys.version)"
