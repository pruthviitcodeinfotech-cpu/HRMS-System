[project]
name = "hrms-backend"
version = "0.1.0"
description = "Enterprise HRMS backend (FastAPI, PostgreSQL, modular monolith)"
# Python 3.12 is the only interpreter the test suite is verified against; see
# docs/environment.md. 3.11 was never validated, and the pinned toolchain below was
# resolved and green on 3.12 exclusively. The upper bound keeps local, Docker, and CI
# on one interpreter rather than letting each pick its own.
requires-python = ">=3.12,<3.13"
readme = "README.md"

# Every direct dependency is pinned to an exact version. `uv.lock` pins the full
# transitive graph with hashes; requirements*.txt are generated from it. Change a
# version here, then regenerate with `make lock`.
dependencies = [
    "fastapi==0.139.0",
    "uvicorn[standard]==0.51.0",
    "sqlalchemy[asyncio]==2.0.51",
    "alembic==1.18.5",
    "asyncpg==0.31.0",
    "psycopg2-binary==2.9.12",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.2",
    "python-jose[cryptography]==3.5.0",
    # passlib 1.7.4 probes the bcrypt backend with a 73-byte password. bcrypt >= 5
    # raises ValueError instead of truncating, which makes every hash_password()
    # call fail; bcrypt >= 4.1 removed __about__, which passlib logs as a trapped
    # error on import. Pin to the last release that is clean on both counts.
    "passlib[bcrypt]==1.7.4",
    "bcrypt==4.0.1",
    "redis==8.0.1",
    # Background jobs. arq is async-native (this codebase is fully async end to end;
    # celery's worker is not and would force a sync bridge around every service call),
    # Redis-backed (no new broker — it reuses REDIS_URL), and small.
    "arq==0.28.0",
    "python-multipart==0.0.32",
    "jinja2==3.1.6",
    "httpx==0.28.1",
    "structlog==26.1.0",
    "websockets==16.1",
]

[project.optional-dependencies]
dev = [
    "pytest==9.1.1",
    "pytest-asyncio==1.4.0",
    "pytest-cov==7.1.0",
    "faker==40.28.1",
    "ruff==0.15.21",
    "black==26.5.1",
    "mypy==2.2.0",
    "pre-commit==4.6.0",
]

# arq 0.28.0 caps its redis-py requirement at `<6` — a conservative bound it has not
# lifted, not a known incompatibility: arq only uses the long-stable `redis.asyncio`
# surface (`Redis`, `ConnectionPool`, `from_url`, pipelines), all unchanged in redis-py
# 8.x, and the worker/queue are exercised against redis==8.0.1 here. Downgrading redis
# for the job library would be the wrong trade — the cache, rate limiter, and event
# broker all run on it — so the bound is overridden rather than obeyed. Revisit when arq
# widens the pin upstream.
[tool.uv]
override-dependencies = ["redis==8.0.1"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

# The repo root holds several top-level directories (app, tests, alembic, scripts,
# docs, var). Setuptools' flat-layout auto-discovery refuses to guess between them
# and aborts, so name the distributed package explicitly.
[tool.setuptools.packages.find]
include = ["app*"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4"]

[tool.mypy]
python_version = "3.11"
warn_unused_ignores = true
disallow_untyped_defs = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
