# Alembic configuration for the HRMS backend.
# The database URL is loaded from the environment in alembic/env.py
# (do NOT hardcode credentials here).

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is set programmatically in env.py from DATABASE_URL

[post_write_hooks]
hooks = black
black.type = console_scripts
black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
